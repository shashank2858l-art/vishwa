# ============================================
# Render.com Blueprint — Backend Service
# ============================================
# Deploy as a Web Service on Render.com

services:
  - type: web
    name: vishwas-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LUXAND_API_KEY
        sync: false
      - key: TEMP_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@vishwas.com
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
    rootDir: backend
